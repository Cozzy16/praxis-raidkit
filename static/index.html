<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRAXIS RAID TOOLKIT v3.1 - WEB</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--card:#111;--border:#1a1a1a;--accent:#ff0040;--accent2:#00ff00;--text:#e0e0e0;--text-dim:#666;--danger:#ff0040;--success:#00ff00;--warn:#ffaa00}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes glow{0%,100%{box-shadow:0 0 5px var(--accent)}50%{box-shadow:0 0 20px var(--accent),0 0 40px rgba(255,0,64,.3)}}
@keyframes scan{0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}
@keyframes blink{0%,50%,100%{opacity:1}25%,75%{opacity:0}}
.header{text-align:center;padding:30px 20px;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.header::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,transparent,rgba(255,0,64,.05));pointer-events:none}
.banner{font-size:clamp(1.2rem,4vw,2rem);color:var(--accent);text-shadow:0 0 10px rgba(255,0,64,.5);animation:pulse 2s infinite;letter-spacing:4px;font-weight:bold}
.subtitle{color:var(--text-dim);font-size:.8rem;margin-top:8px;letter-spacing:2px}
.container{max-width:900px;margin:0 auto;padding:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.card-title{color:var(--accent);font-size:.9rem;margin-bottom:16px;text-transform:uppercase;letter-spacing:2px;display:flex;align-items:center;gap:8px}
.card-title::before{content:'>';animation:blink 1s infinite}
label{display:block;color:var(--text-dim);font-size:.75rem;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
input[type="text"],input[type="password"],input[type="number"]{width:100%;background:#0d0d0d;border:1px solid var(--border);color:var(--accent2);padding:10px 12px;font-family:inherit;font-size:.85rem;border-radius:4px;outline:none;transition:border-color .3s}
input:focus{border-color:var(--accent);box-shadow:0 0 10px rgba(255,0,64,.2)}
input::placeholder{color:#333}
.btn{background:transparent;border:1px solid var(--accent);color:var(--accent);padding:10px 20px;font-family:inherit;font-size:.8rem;cursor:pointer;text-transform:uppercase;letter-spacing:2px;transition:all .3s;border-radius:4px;width:100%;margin-top:10px}
.btn:hover{background:var(--accent);color:#000;box-shadow:0 0 20px rgba(255,0,64,.4)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-success{border-color:var(--success);color:var(--success)}
.btn-success:hover{background:var(--success);color:#000;box-shadow:0 0 20px rgba(0,255,0,.4)}
.btn-warn{border-color:var(--warn);color:var(--warn)}
.btn-warn:hover{background:var(--warn);color:#000}
.btn-danger{border-color:var(--danger);color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#000}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>*{flex:1;min-width:150px}
.channels-list{max-height:250px;overflow-y:auto;margin:10px 0;border:1px solid var(--border);border-radius:4px;background:#0d0d0d}
.channel-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid #151515;cursor:pointer;transition:background .2s}
.channel-item:hover{background:#1a1a1a}
.channel-item input[type="checkbox"]{accent-color:var(--accent);width:16px;height:16px;cursor:pointer}
.channel-id{color:var(--text-dim);font-size:.7rem}
.channel-name{color:var(--accent2);font-size:.8rem}
.status-bar{background:#0d0d0d;border:1px solid var(--border);border-radius:4px;padding:16px;display:flex;justify-content:space-around;flex-wrap:wrap;gap:10px}
.stat{text-align:center;min-width:80px}
.stat-value{font-size:1.5rem;color:var(--accent2);font-weight:bold}
.stat-value.error{color:var(--danger)}
.stat-value.warn{color:var(--warn)}
.stat-label{font-size:.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.log-area{background:#0d0d0d;border:1px solid var(--border);border-radius:4px;padding:12px;max-height:200px;overflow-y:auto;font-size:.75rem;color:var(--text-dim);margin-top:10px}
.log-entry{padding:2px 0;border-bottom:1px solid #151515}
.log-entry.error{color:var(--danger)}
.log-entry.success{color:var(--success)}
.log-entry.warn{color:var(--warn)}
.loading{display:inline-block;width:14px;height:14px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-left:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.token-status{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:.75rem}
.dot{width:8px;height:8px;border-radius:50%;background:var(--danger)}
.dot.active{background:var(--success);animation:pulse 2s infinite}
.hidden{display:none}
@media(max-width:600px){.row>*{min-width:100%}.status-bar{flex-direction:column}.banner{letter-spacing:2px}}
</style>
</head>
<body>
<div class="header">
<div class="banner">PRAXIS RAID TOOLKIT v3.1</div>
<div class="subtitle">WEB INTERFACE // PULSEBYTE</div>
</div>
<div class="container">
<div class="card">
<div class="card-title">Token Configuration</div>
<label>Discord User Token</label>
<input type="password" id="tokenInput" placeholder="Paste your token here...">
<div class="token-status"><div class="dot" id="tokenDot"></div><span id="tokenStatus">Not set</span></div>
<button class="btn" onclick="setToken()">Set Token</button>
</div>
<div class="card">
<div class="card-title">Channel Fetch</div>
<label>Server / Guild ID</label>
<input type="text" id="serverIdInput" placeholder="Enter server ID...">
<button class="btn btn-success" onclick="fetchChannels()">Fetch Channels</button>
<div id="channelsContainer" class="hidden">
<div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center">
<span style="font-size:.75rem;color:var(--text-dim)">Select channels:</span>
<label style="font-size:.7rem;cursor:pointer"><input type="checkbox" id="selectAll" onchange="toggleAll()"> Select All</label>
</div>
<div class="channels-list" id="channelsList"></div>
<div class="row">
<button class="btn btn-success" onclick="createWebhooks()">Create Webhooks</button>
<button class="btn btn-warn" onclick="scanWebhooks()">Scan Existing</button>
</div>
</div>
</div>
<div class="card">
<div class="card-title">Bulk Channel Creation</div>
<div class="row">
<div><label>Amount</label><input type="number" id="channelAmount" value="5" min="1" max="100"></div>
<div><label>Base Name</label><input type="text" id="channelBaseName" value="0x74A-raid"></div>
</div>
<button class="btn btn-warn" onclick="createChannels()">Create Channels</button>
</div>
<div class="card">
<div class="card-title">Bombing Operation</div>
<label>Max Messages (1-500)</label>
<input type="number" id="maxMessages" value="50" min="1" max="500">
<button class="btn btn-danger" onclick="startBomb()" id="bombBtn">Start Bomb</button>
<div class="status-bar" id="statusBar" style="margin-top:16px">
<div class="stat"><div class="stat-value" id="statSent">0</div><div class="stat-label">Sent</div></div>
<div class="stat"><div class="stat-value" id="statRPS">0</div><div class="stat-label">RPS</div></div>
<div class="stat"><div class="stat-value warn" id="statRate">0</div><div class="stat-label">Rate Limited</div></div>
<div class="stat"><div class="stat-value error" id="statErrors">0</div><div class="stat-label">Errors</div></div>
<div class="stat"><div class="stat-value" id="statDuration">0s</div><div class="stat-label">Duration</div></div>
</div>
</div>
<div class="card">
<div class="card-title">System Log</div>
<div class="log-area" id="logArea"></div>
</div>
</div>
<script>
const API=window.location.origin;
let channels=[],selectedChannels=[];
function log(msg,type=''){const el=document.getElementById('logArea');const d=document.createElement('div');d.className='log-entry'+(type?' '+type:'');d.textContent=`[${new Date().toLocaleTimeString()}] ${msg}`;el.prepend(d);if(el.children.length>100)el.removeChild(el.lastChild)}
async function apiCall(path,body={}){try{const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();if(!r.ok)throw new Error(d.detail||'Request failed');return d}catch(e){log(e.message,'error');throw e}}
async function setToken(){const t=document.getElementById('tokenInput').value.trim();if(!t){log('Token cannot be empty','error');return}try{await apiCall('/api/token',{token:t});log('Token set successfully','success');checkTokenStatus()}catch(e){log('Failed to set token','error')}}
async function checkTokenStatus(){try{const r=await fetch(API+'/api/token/status');const d=await r.json();const dot=document.getElementById('tokenDot');const st=document.getElementById('tokenStatus');if(d.set){dot.classList.add('active');st.textContent='Active: '+d.masked}else{dot.classList.remove('active');st.textContent='Not set'}}catch(e){}}
async function fetchChannels(){const sid=document.getElementById('serverIdInput').value.trim();if(!sid){log('Server ID required','error');return}log('Fetching channels...');try{const d=await apiCall('/api/channels',{server_id:sid});channels=d.channels;selectedChannels=[];renderChannels();document.getElementById('channelsContainer').classList.remove('hidden');log(`Found ${d.count} channels`,'success')}catch(e){log('Failed to fetch channels','error')}}
function renderChannels(){const el=document.getElementById('channelsList');el.innerHTML='';channels.forEach(ch=>{const div=document.createElement('div');div.className='channel-item';div.innerHTML=`<input type="checkbox" data-id="${ch.id}" onchange="updateSelection()"><div><div class="channel-name">#${ch.name}</div><div class="channel-id">${ch.id}</div></div>`;el.appendChild(div)})}
function toggleAll(){const checked=document.getElementById('selectAll').checked;document.querySelectorAll('#channelsList input[type="checkbox"]').forEach(cb=>{cb.checked=checked});updateSelection()}
function updateSelection(){selectedChannels=[];document.querySelectorAll('#channelsList input[type="checkbox"]:checked').forEach(cb=>{selectedChannels.push(cb.dataset.id)});log(`Selected ${selectedChannels.length} channels`)}
async function createWebhooks(){if(!selectedChannels.length){log('Select channels first','error');return}log(`Creating webhooks in ${selectedChannels.length} channels...`);try{const d=await apiCall('/api/webhooks',{server_id:document.getElementById('serverIdInput').value.trim(),channel_ids:selectedChannels});log(`Created ${d.count} webhooks`,'success')}catch(e){log('Failed to create webhooks','error')}}
async function scanWebhooks(){if(!selectedChannels.length){log('Select channels first','error');return}log('Scanning for existing webhooks...');try{const d=await apiCall('/api/webhooks/scan',{server_id:document.getElementById('serverIdInput').value.trim(),channel_ids:selectedChannels});log(`Found ${d.count} webhooks`,'success')}catch(e){log('Failed to scan webhooks','error')}}
async function createChannels(){const sid=document.getElementById('serverIdInput').value.trim();const amount=parseInt(document.getElementById('channelAmount').value);const baseName=document.getElementById('channelBaseName').value.trim();if(!sid){log('Server ID required','error');return}if(!amount||amount<1){log('Invalid amount','error');return}log(`Creating ${amount} channels...`);try{const d=await apiCall('/api/channels/create',{server_id:sid,amount,base_name:baseName});log(`Created ${d.created}/${d.total} channels`,'success');if(d.channel_ids&&d.channel_ids.length){document.getElementById('serverIdInput').value=sid;await fetchChannels()}}catch(e){log('Failed to create channels','error')}}
async function startBomb(){const sid=document.getElementById('serverIdInput').value.trim();const maxMsg=parseInt(document.getElementById('maxMessages').value);const btn=document.getElementById('bombBtn');if(!sid&&!selectedChannels.length){log('Provide server ID or select channels','error');return}btn.disabled=true;btn.innerHTML='Bombing<span class="loading"></span>';log(`Starting bomb: ${maxMsg} messages max`);document.getElementById('statSent').textContent='0';document.getElementById('statRPS').textContent='0';document.getElementById('statRate').textContent='0';document.getElementById('statErrors').textContent='0';document.getElementById('statDuration').textContent='0s';try{const body={max_messages:maxMsg};if(selectedChannels.length)body.channel_ids=selectedChannels;else body.server_id=sid;const startTime=Date.now();const interval=setInterval(()=>{document.getElementById('statDuration').textContent=((Date.now()-startTime)/1000).toFixed(1)+'s'},100);const d=await apiCall('/api/bomb',body);clearInterval(interval);document.getElementById('statSent').textContent=d.sent;document.getElementById('statRPS').textContent=d.duration>0?(d.sent/d.duration).toFixed(1):'0';document.getElementById('statRate').textContent=d.rate_limited;document.getElementById('statErrors').textContent=d.errors;document.getElementById('statDuration').textContent=d.duration+'s';log(`Bomb complete: ${d.sent} sent, ${d.rate_limited} rate limited, ${d.errors} errors in ${d.duration}s`,'success')}catch(e){log('Bomb operation failed','error')}finally{btn.disabled=false;btn.textContent='Start Bomb'}}
checkTokenStatus();
log('PRAXIS RAID TOOLKIT v3.1 initialized');
</script>
</body>
</html>
